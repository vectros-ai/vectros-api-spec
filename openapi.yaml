          type: string
          description: "When the source item was created, as an ISO-8601 UTC timestamp."
          example: 2024-01-15T09:30:00Z
      description: A single content chunk that matched the search query.
    SearchRequest:
      required:
      - query
      type: object
      properties:
        query:
          type: string
          description: "The search query, expressed in natural language or as keywords.\
            \ Required."
