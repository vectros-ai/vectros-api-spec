              schema:
                type: integer
      security:
        - BearerAuth: []
  /v1/auth/token:

    post:
      tags:
      - Auth
      summary: Mint a scoped bearer token for one of your end users
      description: "Creates a short-lived JWT bearer token restricted to specific\
        \ actions and, optionally, to a particular user, organization, or client.\
        \ Use this to hand a narrowly-scoped credential to a browser or downstream\
        \ service so it never sees your root API key. Only callable with a root API\
        \ key (`sk_*`)."
      operationId: mintToken
      requestBody:
        content:
          application/json:
            schema:
