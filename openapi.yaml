  /v1/schemas/{id}/versions:

    get:
      tags:
      - Schemas
      summary: Get a record schema's version history
      description: "Returns the audit trail of changes to a record schema, newest\
        \ first (create, update, and delete). Schema version history is always recorded\
        \ — there is no per-schema toggle to disable it. Requires the `schemas:r`\
        \ scope."
      operationId: getSchemaVersions
      parameters:
      - name: id
        in: path
        description: The id of the schema whose version history you want.
