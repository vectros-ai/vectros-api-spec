openapi: 3.0.1
info:
  title: Vectros API
  description: Enterprise-grade hybrid search and semantic memory API. Ingest documents and structured records, search across all content with hybrid BM25 + semantic ranking, and manage users, organizations, and clients.
  version: "0.31.0"
  contact:
    name: Vectros Developer Support
    url: https://docs.vectros.ai
tags:
  - name: Search
    description: Hybrid BM25 + semantic search across all indexed content
  - name: Documents
    description: Ingest text and file documents for indexing and retrieval
  - name: Records
    description: Schema-validated structured records with search indexing
  - name: Schemas
    description: Define record types with field validation and lookup indexes
  - name: Folders
    description: Organize documents and records into folder hierarchies
  - name: Identity
    description: Manage users, organizations, and clients
  - name: Inference
    description: Streaming LLM endpoints — chat, RAG, and per-document Q&A
  - name: Compliance
    description: Subject-data lifecycle — right-to-erasure and data export (GDPR/CCPA)
  - name: Auth
    description: API key validation and scoped token minting

paths:
  /v1/auth/jwks:

    get:
      tags:
      - Auth
      summary: Get the platform's JWT signing public key (JWKS)
      description: "Returns the platform's JWT signing public key in RFC 7517 JWKS\
        \ format. Use it with any JWKS-aware JWT library to verify `inv_*` invite\
        \ tokens, `st_*` scoped tokens, and other platform-signed tokens locally,\
        \ without calling back to the API for each verification. The response carries\
        \ a one-hour `Cache-Control`, so cache it and re-fetch roughly hourly rather\
        \ than on every verification. The `kid` value changes when the key rotates;\
        \ re-fetch this document whenever you encounter a token signed with an unknown\
        \ `kid`."
      operationId: getJwks
      responses:
        "200":
          description: The JWKS document containing the signing public key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JwksResponse"
        "500":
          description: The signing public key could not be retrieved. Retry the request.
      security:
        - BearerAuth: []
  /v1/admin/access-log:

    get:
      tags:
      - Auth
      summary: Query the PHI read-access (accounting-of-disclosures) log
      description: "Returns a page of per-subject PHI read-access rows: who read which\
        \ subject's PHI, when, against which record, and whether any sensitive value\
        \ was actually revealed in plaintext. Metadata only — never the PHI itself.\
        \ This is the disclosure-accounting surface from which a covered entity derives\
        \ its HIPAA §164.528 accounting of disclosures. Provide at least one query\
        \ axis: a subject (`subjectType` + `subjectId`, plus optional `clientId`)\
        \ within a `contextId` for the primary accounting query; `resourceId` within\
        \ a `contextId` for 'who read this record'; `callerKeyId` for 'what did this\
        \ credential read' (account-wide forensic); or `contextId` alone to enumerate\
        \ a whole context. `from`/`to` bound the time window. Results are scoped to\
        \ your account, derived from your token — never from input. Requires the `access-log:r`\
        \ scope."
      operationId: getAccessLog
      parameters:
      - name: subjectType
        in: query
        description: "Kind of subject to account for: `user`, `client`, or `org`."
        schema:
          type: string
        example: user
      - name: subjectId
        in: query
        description: Identifier of the data subject whose read history to return —
          the primary accounting-of-disclosures axis. Must be supplied together with
          `subjectType` (and a `contextId`).
        schema:
          type: string
        example: user_abc123
      - name: contextId
        in: query
        description: Restrict results to a single app context (the data-partition
          axis). Required for a subject or record query.
        schema:
          type: string
        example: ctx_intake
      - name: clientId
        in: query
        description: Further restrict a subject query to reads about a single nested
          client/patient.
        schema:
          type: string
        example: client_xyz789
      - name: from
        in: query
        description: "Start of the time window (ISO-8601 UTC, inclusive)."
        schema:
          type: string
        example: 2025-01-15T00:00:00Z
      - name: to
        in: query
        description: "End of the time window (ISO-8601 UTC, exclusive; defaults to\
          \ now)."
        schema:
          type: string
        example: 2025-02-15T00:00:00Z
      - name: action
        in: query
        description: "Restrict to a single action: `read`, `list`, `lookup`, `search`,\
          \ or `rag`."
        schema:
          type: string
        example: read
      - name: callerKeyId
        in: query
        description: Forensic axis — restrict to reads performed by a single credential
          (the API key / scoped token key id that made the call).
        schema:
          type: string
        example: key_abc123
      - name: resourceType
        in: query
        description: "Restrict to a single accessed resource type: a record schema\
          \ type name, or one of `document`, `search`, or `rag`."
        schema:
          type: string
        example: intake_form
      - name: resourceId
        in: query
        description: Forensic axis — restrict to reads of a single accessed record/document
          id.
        schema:
          type: string
        example: rec_456
      - name: revealedSensitive
        in: query
        description: "If true, return only reads that actually revealed a sensitive\
          \ value in plaintext."
        schema:
          type: boolean
        example: false
      - name: startFrom
        in: query
        description: Opaque cursor from a previous page's `nextCursor`; pass it back
          to fetch the next page.
        schema:
          type: string
      - name: limit
        in: query
        description: Maximum number of rows to return per page (1–500; defaults to
          200).
        schema:
          type: integer
          format: int32
        example: 200
      responses:
        "200":
          description: A page of read-access rows.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadAccessLogPage"
        "400":
          description: Missing or invalid query parameters.
        "403":
          description: Your token lacks the `access-log:r` scope.
      security:
        - BearerAuth: []
  /v1/admin/keys/scoped:

    get:
      tags:
      - Auth
      summary: List your scoped API keys
      description: Lists all of your scoped API keys (`ssk_*`) across both your live
        and test environments. Revoked keys are excluded. Requires the `keys:r` scope.
      operationId: listScopedKeys
      responses:
        "200":
          description: The list of scoped API keys.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScopedKeyPage"
        "403":
          description: Your token lacks the `keys:r` scope.
      security:
        - BearerAuth: []
    post:
      tags:
      - Auth
      summary: Mint a scoped API key bound to an existing access profile
      description: "Creates a scoped API key (an `ssk_*` secret) that inherits its\
        \ permissions from an existing access profile in your account. The call is\
        \ idempotent on the combination of tenant, context, user, and key name: re-issuing\
        \ the same request returns the existing key WITHOUT re-disclosing its raw\
        \ secret. The raw key is returned ONLY in this response — store it securely,\
        \ as it cannot be retrieved again. Requires the `keys:c` scope."
      operationId: createScopedKey
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScopedKeyRequest"
        required: true
      responses:
        "201":
          description: Key created. The raw secret is included in this response only
            and is never returned again.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScopedKeyResponse"
        "200":
          description: A matching key already exists; its metadata is returned. The
            raw secret is NOT re-disclosed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScopedKeyResponse"
        "400":
          description: "Validation error — for example, a missing required field,\
            \ or your plan's active-key limit has been reached."
        "403":
          description: Your token lacks the `keys:c` scope.
        "404":
          description: "The referenced context, user, or access profile does not exist\
            \ in your account."
        "429":
          description: You have exceeded the per-minute request limit for your plan. Read the `Retry-After` response header for the number of seconds to wait before retrying, and the `X-RateLimit-Limit` header for your plan's limit. See the rate limits guide for the per-plan limits and recommended backoff.
          headers:
            Retry-After:
              description: Seconds to wait before retrying. After this many seconds the rate-limit window resets and the request can be retried.
              schema:
                type: integer
            X-RateLimit-Limit:
              description: The maximum number of requests permitted per minute on your plan.
              schema:
                type: integer
            X-RateLimit-Remaining:
              description: Requests remaining in the current window. Always 0 on a 429 response.
              schema:
                type: integer
      security:
        - BearerAuth: []
  /v1/admin/keys/scoped/{keyId}:

    get:
      tags:
      - Auth
      summary: Get a scoped API key by its ID
      description: "Returns the metadata for a single scoped API key. The raw secret\
        \ is NOT included — it is only ever returned once, when the key is first created.\
        \ Requires the `keys:r` scope."
      operationId: getScopedKey
      parameters:
      - name: keyId
        in: path
        description: "The key's `keyId`, as returned when the key was created."
        required: true
        schema:
          type: string
      responses:
        "200":
          description: The scoped API key's metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScopedKeyResponse"
        "403":
          description: Your token lacks the `keys:r` scope.
        "404":
          description: No such key in your account. Keys belonging to another account
            return this same response.
      security:
        - BearerAuth: []
    delete:
      tags:
      - Auth
      summary: Revoke a scoped API key by its ID
      description: "Revokes a scoped API key. Its status changes to `revoked` and\
        \ it stops working within about 5 minutes, the maximum time authorization\
        \ is cached. Revocation is permanent. Requires the `keys:d` scope."
      operationId: revokeScopedKey
      parameters:
      - name: keyId
        in: path
        description: "The key's `keyId`, as returned when the key was created."
        required: true
        schema:
          type: string
      responses:
        "204":
          description: The key was revoked (or was already revoked — the call is idempotent).
        "403":
          description: Your token lacks the `keys:d` scope.
        "404":
          description: No such key in your account. Keys belonging to another account
            return this same response.
        "429":
          description: You have exceeded the per-minute request limit for your plan. Read the `Retry-After` response header for the number of seconds to wait before retrying, and the `X-RateLimit-Limit` header for your plan's limit. See the rate limits guide for the per-plan limits and recommended backoff.
          headers:
            Retry-After:
              description: Seconds to wait before retrying. After this many seconds the rate-limit window resets and the request can be retried.
              schema:
                type: integer
            X-RateLimit-Limit:
              description: The maximum number of requests permitted per minute on your plan.
              schema:
                type: integer
            X-RateLimit-Remaining:
              description: Requests remaining in the current window. Always 0 on a 429 response.
              schema:
                type: integer
      security:
        - BearerAuth: []
  /v1/admin/logs:

    get:
      tags:
      - Auth
      summary: Query your API call logs
      description: "Returns recent API call logs for your account. Each entry represents\
        \ one API request; request and response bodies are never logged. `startTime`\
        \ and `endTime` must be ISO-8601 UTC (e.g. `2025-01-15T09:00:00Z`); `endTime`\
        \ defaults to now. Filter by resource, method, key id, or context id, or set\
        \ `errorsOnly` to see only failures. Results are scoped to your account, derived\
        \ from your token — never from input. Requires the `logs:r` scope."
      operationId: getAdminLogs
      parameters:
      - name: startTime
        in: query
        description: Start of the time window (ISO-8601 UTC).
        required: true
        schema:
          type: string
        example: 2025-01-15T09:00:00Z
      - name: endTime
        in: query
        description: End of the time window (ISO-8601 UTC; defaults to now).
        schema:
          type: string
        example: 2025-01-15T10:00:00Z
      - name: resource
        in: query
        description: "Filter by resource type. One of `documents`, `records`, `search`,\
          \ `schemas`, `folders`, `clients`, `orgs`, `users`, `usage`, `auth`, `models`,\
          \ `ping`, `rag`, `chat`, `ask`, `erasure-requests`, or `export`."
        schema:
          type: string
        example: documents
      - name: method
        in: query
        description: "Filter by HTTP method (`GET`, `POST`, `PUT`, or `DELETE`)."
        schema:
          type: string
        example: POST
      - name: keyId
        in: query
        description: Filter by API key id to inspect a specific credential's traffic.
        schema:
          type: string
        example: key_abc123
      - name: contextId
        in: query
        description: Filter by app context id to inspect a specific context's traffic.
        schema:
          type: string
        example: ctx_intake
      - name: errorsOnly
        in: query
        description: "If true, return only requests with a status of 400 or higher."
        schema:
          type: boolean
      - name: limit
        in: query
        description: Maximum number of log entries to return per page (1–500; defaults
          to 200).
        schema:
          type: integer
          format: int32
        example: 200
      responses:
        "200":
          description: A page of log entries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLogsResponse"
        "400":
          description: Missing or invalid parameters.
        "403":
          description: Your token lacks the `logs:r` scope.
      security:
        - BearerAuth: []
  /v1/app-contexts/{contextId}/profiles:

    get:
      tags:
      - Auth
      summary: List access profiles in an app context
      description: "Returns the access profiles assigned within the given app context\
        \ — in effect, who has access to this context and with what scopes. Each profile\
        \ binds a principal to either a set of inline scopes or a referenced role.\
        \ Results are paginated. Requires the `profiles:r` scope."
      operationId: listAccessProfiles
      parameters:
      - name: contextId
        in: path
        description: Your identifier for the app context.
        required: true
        schema:
          type: string
        example: myapp
      - name: startFrom
        in: query
        description: Pagination cursor. Pass the `nextCursor` value returned by the
          previous page to fetch the next page; omit it to start from the first page.
        schema:
          type: string
      - name: limit
        in: query
        description: Maximum number of results to return per page. Must be between
          1 and 100; defaults to 20.
        schema:
          maximum: 100
          minimum: 1
          type: integer
          format: int64
          default: 20
        example: 20
      responses:
        "200":
          description: A page of access profiles.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessProfilePage"
        "404":
          description: No app context exists with this contextId.
        "403":
          description: Not authorized.
      security:
        - BearerAuth: []
    post:
      tags:
      - Auth
      summary: Create an access profile
      description: "Creates a new access profile under the given app context. This\
        \ call is idempotent by `principalId`: if a profile with the same `principalId`\
        \ already exists, the existing profile is returned (with status 200) instead\
        \ of creating a duplicate. The response's `created` field (and the HTTP status\
        \ — 201 when created, 200 when an existing profile was returned) tells the\
        \ two apart. To overwrite an existing profile's `scopes`/`roleId`, `identityOverrides`,\
        \ and `status` instead of returning it unchanged, set `?upsert=true` (this\
        \ also requires the `profiles:u` scope). You must provide exactly one of `scopes`\
        \ (an inline list of scopes) or `roleId` (a reference to a role); supplying\
        \ both, or neither, is rejected. `identityOverrides` may set only `orgId`\
        \ and `clientId`; any other key (including the account identifier or `userId`)\
        \ is rejected. If you use a scoped credential, the profile's effective scopes\
        \ may not exceed your own; a root API key (`sk_`) is exempt. Requires the\
        \ `profiles:c` scope."
      operationId: createAccessProfile
      parameters:
      - name: upsert
        in: query
        description: "When `true`, if a profile with the same `principalId` already\
          \ exists its grant source (`scopes` or `roleId`), `identityOverrides`, and\
          \ `status` are updated to the submitted values instead of being returned\
          \ unchanged. Defaults to `false`. Requires the `profiles:u` scope in addition\
          \ to `profiles:c`."
        schema:
          type: boolean
          default: false
      - name: contextId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessProfileRequest"
        required: true
      responses:
        "201":
          description: Access profile created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessProfileResponse"
        "200":
          description: A profile with this principalId already exists; the existing
            profile is returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessProfileResponse"
        "400":
          description: "Invalid principalId, or both/neither of scopes and roleId\
            \ were provided, or an identityOverrides key is not permitted."
        "404":
          description: No app context exists with this contextId.
        "403":
          description: Not authorized.
        "429":
          description: You have exceeded the per-minute request limit for your plan. Read the `Retry-After` response header for the number of seconds to wait before retrying, and the `X-RateLimit-Limit` header for your plan's limit. See the rate limits guide for the per-plan limits and recommended backoff.
          headers:
            Retry-After:
              description: Seconds to wait before retrying. After this many seconds the rate-limit window resets and the request can be retried.
              schema:
                type: integer
            X-RateLimit-Limit:
              description: The maximum number of requests permitted per minute on your plan.
              schema:
                type: integer
            X-RateLimit-Remaining:
              description: Requests remaining in the current window. Always 0 on a 429 response.
              schema:
                type: integer
      security:
        - BearerAuth: []
  /v1/app-contexts:

    get:
      tags:
      - Auth
      summary: List app contexts
      description: Returns a paginated list of the app contexts in your account. Each
        app context is a namespace that groups the access profiles and roles for one
        of your applications. Requires the `app-contexts:r` scope.
      operationId: listAppContexts
      parameters:
      - name: startFrom
        in: query
        description: Pagination cursor. Pass the `nextCursor` value returned by the
          previous page to fetch the next page; omit it to start from the first page.
        schema:
          type: string
      - name: limit
        in: query
        description: Maximum number of results to return per page. Must be between
          1 and 100; defaults to 20.
        schema:
          maximum: 100
          minimum: 1
          type: integer
          format: int64
          default: 20
        example: 20
      responses:
        "200":
          description: A page of app contexts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppContextPage"
        "403":
          description: Not authorized.
      security:
        - BearerAuth: []
    post:
      tags:
      - Auth
      summary: Create an app context
      description: "Creates a new app context. This call is idempotent by `contextId`:\
        \ if an app context with the same `contextId` already exists, the existing\
        \ app context is returned (with status 200) instead of creating a duplicate.\
        \ The response's `created` field (and the HTTP status — 201 when created,\
        \ 200 when an existing context was returned) tells the two apart. To overwrite\
        \ an existing context's `name`/`description` instead of returning it unchanged,\
        \ set `?upsert=true` (this also requires the `app-contexts:u` scope). The\
        \ reserved `contextId` value `vectros-admin` cannot be created through this\
        \ endpoint; it is provisioned automatically for your account. Requires the\
        \ `app-contexts:c` scope."
      operationId: createAppContext
      parameters:
      - name: upsert
        in: query
        description: "When `true`, if an app context with the same `contextId` already\
          \ exists its `name` and `description` are updated to the submitted values\
          \ instead of being returned unchanged. Defaults to `false`. Requires the\
          \ `app-contexts:u` scope in addition to `app-contexts:c`."
        schema:
          type: boolean
          default: false
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppContextRequest"
        required: true
      responses:
        "201":
          description: App context created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppContextResponse"
        "200":
          description: A context with this contextId already exists; the existing
            context is returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppContextResponse"
        "400":
          description: The contextId format is invalid.
        "403":
          description: Not authorized.
        "429":
          description: You have exceeded the per-minute request limit for your plan. Read the `Retry-After` response header for the number of seconds to wait before retrying, and the `X-RateLimit-Limit` header for your plan's limit. See the rate limits guide for the per-plan limits and recommended backoff.
          headers:
            Retry-After:
              description: Seconds to wait before retrying. After this many seconds the rate-limit window resets and the request can be retried.
              schema:
                type: integer
            X-RateLimit-Limit:
              description: The maximum number of requests permitted per minute on your plan.
              schema:
                type: integer
            X-RateLimit-Remaining:
              description: Requests remaining in the current window. Always 0 on a 429 response.
              schema:
                type: integer
      security:
        - BearerAuth: []
  /v1/app-contexts/{contextId}/roles:

    get:
      tags:
      - Auth
      summary: List roles in an app context
      description: "Returns the roles defined under the given app context. A role\
        \ is a reusable, named bundle of scopes that access profiles can reference\
        \ instead of listing scopes inline. Results are paginated. Requires the `profiles:r`\
        \ scope."
      operationId: listRoles
      parameters:
      - name: contextId
        in: path
        description: Your identifier for the app context.
        required: true
        schema:
          type: string
        example: myapp
      - name: startFrom
        in: query
        description: Pagination cursor. Pass the `nextCursor` value returned by the
          previous page to fetch the next page; omit it to start from the first page.
        schema:
          type: string
      - name: limit
        in: query
        description: Maximum number of results to return per page. Must be between
          1 and 100; defaults to 20.
        schema:
          maximum: 100
          minimum: 1
          type: integer
          format: int64
          default: 20
        example: 20
      responses:
        "200":
          description: A page of roles.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RolePage"
        "404":
          description: No app context exists with this contextId.
        "403":
          description: Not authorized.
      security:
        - BearerAuth: []
    post:
      tags:
      - Auth
      summary: Create a role
      description: "Creates a new role under the given app context. This call is idempotent\
        \ by `roleId`: if a role with the same `roleId` already exists, the existing\
        \ role is returned (with status 200) instead of creating a duplicate. The\
        \ response's `created` field (and the HTTP status — 201 when created, 200\
        \ when an existing role was returned) tells the two apart. To overwrite an\
        \ existing role's `name`/`description`/`scopes` instead of returning it unchanged,\
        \ set `?upsert=true` (this also requires the `profiles:u` scope). If you use\
        \ a scoped credential, the role's scopes may not exceed your own; a root API\
        \ key (`sk_`) is exempt. Requires the `profiles:c` scope."
      operationId: createRole
      parameters:
      - name: upsert
        in: query
        description: "When `true`, if a role with the same `roleId` already exists\
          \ its `name`, `description`, and `scopes` are updated to the submitted values\
          \ instead of being returned unchanged. Defaults to `false`. Requires the\
          \ `profiles:u` scope in addition to `profiles:c`."
        schema:
          type: boolean
          default: false
      - name: contextId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleRequest"
        required: true
      responses:
        "201":
          description: Role created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleResponse"
        "200":
          description: A role with this roleId already exists; the existing role is
            returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleResponse"
        "400":
          description: The roleId format is invalid or the scopes payload is malformed.
        "404":
          description: No app context exists with this contextId.
        "403":
          description: Not authorized.
        "429":
          description: You have exceeded the per-minute request limit for your plan. Read the `Retry-After` response header for the number of seconds to wait before retrying, and the `X-RateLimit-Limit` header for your plan's limit. See the rate limits guide for the per-plan limits and recommended backoff.
          headers:
            Retry-After:
              description: Seconds to wait before retrying. After this many seconds the rate-limit window resets and the request can be retried.
              schema:
                type: integer
            X-RateLimit-Limit:
              description: The maximum number of requests permitted per minute on your plan.
              schema:
                type: integer
            X-RateLimit-Remaining:
