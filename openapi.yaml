      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "204":
          description: The document was deleted.
        "404":
          description: "No document with this ID exists in your account, or it is\
            \ outside your access scope."
        "429":
          description: You have exceeded the per-minute request limit for your plan. Read the `Retry-After` response header for the number of seconds to wait before retrying, and the `X-RateLimit-Limit` header for your plan's limit. See the rate limits guide for the per-plan limits and recommended backoff.
          headers:
            Retry-After:
              description: Seconds to wait before retrying. After this many seconds the rate-limit window resets and the request can be retried.
              schema:
                type: integer
            X-RateLimit-Limit:
              description: The maximum number of requests permitted per minute on your plan.
              schema:
                type: integer
