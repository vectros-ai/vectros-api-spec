  /v1/users/{id}/versions:

    get:
      tags:
      - Identity
      summary: Get a user's version history
      description: "Returns the audit trail of changes to a user, most recent first.\
        \ Identity history is always recorded and always available. Sensitive field\
        \ values are redacted in every historical version. Returns a page in the `{data,\
        \ nextCursor}` envelope. Requires the `users:r` scope."
