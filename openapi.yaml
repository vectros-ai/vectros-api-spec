  /v1/users/invite:

    post:
      tags:
      - Auth
      summary: Invite a sub-user by email
      description: "Invite a new member to one of your app contexts by email. Creates\
        \ a pending user with a pre-resolved access profile (their permissions on\
        \ accept) and signs an invitation token. This call is idempotent on the combination\
        \ of context and email: re-inviting the same email in the same context rotates\
        \ the token and resends the invitation rather than creating a duplicate. Returns\
        \ HTTP 201 on a new invite or a successful resend. Returns 409 if that email\
        \ already belongs to an active or suspended member of the app context, or\
        \ already has an identity elsewhere in your account (an email can currently\
        \ belong to only one tenant per account, i.e. your test and live environments\
        \ cannot share an email). When `sendEmail` is false, the response includes\
        \ the raw token and a ready-to-use accept link so you can deliver the invitation\
        \ through your own email provider. Requires the `admin:users` scope."
      operationId: createInvite
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInviteRequest"
        required: true
      responses:
        "201":
          description: "Invitation created, or an existing pending invitation resent\
            \ with a fresh token."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInviteResponse"
        "400":
          description: "Validation error: malformed email, an `acceptUrl` that is\
            \ not an https domain URL, or a `ttlSeconds` outside the allowed range."
        "403":
          description: Your token lacks the `admin:users` scope.
        "404":
          description: The referenced app context does not exist in your account.
        "409":
          description: "Email already in use: either an active or suspended member\
            \ of this context already has it, or it is already associated with an\
            \ identity elsewhere in your account. Only the second case returns a structured\
            \ body with the `email_already_associated` error code."
        "429":
          description: You have exceeded the per-minute request limit for your plan. Read the `Retry-After` response header for the number of seconds to wait before retrying, and the `X-RateLimit-Limit` header for your plan's limit. See the rate limits guide for the per-plan limits and recommended backoff.
          headers:
            Retry-After:
              description: Seconds to wait before retrying. After this many seconds the rate-limit window resets and the request can be retried.
              schema:
                type: integer
            X-RateLimit-Limit:
              description: The maximum number of requests permitted per minute on your plan.
              schema:
                type: integer
            X-RateLimit-Remaining:
              description: Requests remaining in the current window. Always 0 on a 429 response.
              schema:
                type: integer
      security:
        - BearerAuth: []
  /v1/users/invite/resend:

    post:
      tags:
      - Auth
      summary: Resend a pending invitation
      description: "Resend an outstanding invitation, identified by its email and\
        \ app context. Rotates the invitation token and extends its expiry, then (when\
        \ `sendEmail` is true) re-delivers the email. Rotating the token invalidates\
        \ any previously issued link for this invitation, so only the newest link\
        \ works. The invitee's pending permissions are left unchanged. Requires the\
        \ `admin:users` scope."
      operationId: resendInvite
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInviteRequest"
        required: true
      responses:
        "201":
          description: Invitation resent with a fresh token and extended expiry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInviteResponse"
        "400":
          description: "Validation error: malformed email, missing context, or an\
            \ invalid `acceptUrl` / `ttlSeconds`."
        "403":
          description: Your token lacks the `admin:users` scope.
        "404":
          description: No pending invitation matches the supplied email and app context.
        "429":
          description: You have exceeded the per-minute request limit for your plan. Read the `Retry-After` response header for the number of seconds to wait before retrying, and the `X-RateLimit-Limit` header for your plan's limit. See the rate limits guide for the per-plan limits and recommended backoff.
          headers:
            Retry-After:
              description: Seconds to wait before retrying. After this many seconds the rate-limit window resets and the request can be retried.
              schema:
                type: integer
            X-RateLimit-Limit:
              description: The maximum number of requests permitted per minute on your plan.
              schema:
                type: integer
            X-RateLimit-Remaining:
              description: Requests remaining in the current window. Always 0 on a 429 response.
              schema:
                type: integer
      security:
        - BearerAuth: []
  /v1/chat:

    post:
      tags:
      - Inference
      summary: Stateless chat inference (streaming)
      description: "Streams a model response as Server-Sent Events (SSE). Send the\
        \ full conversation history in the `messages` array; a message with role `system`\
        \ is extracted and used as the system prompt. Token cost is debited from your\
        \ pre-paid inference balance (in cents), and a small per-call flat fee is\
        \ debited from your monthly platform credit allowance. Requires the `inference:r`\
        \ scope."
      operationId: chatInference
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
