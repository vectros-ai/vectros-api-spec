  /v1/documents/upload:

    post:
      tags:
      - Documents
      summary: Initiate a file upload
      description: "Starts a file-based document by returning a short-lived presigned\
        \ S3 PUT URL. Upload the file bytes directly to `uploadUrl`; the document\
        \ is then automatically queued for text extraction and asynchronous indexing.\
        \ Supplying an `externalId` makes this idempotent — re-initiating an upload\
        \ with the same `externalId` re-issues a fresh presigned URL to the SAME existing\
        \ document/object (so a re-upload inherently replaces the file body) rather\
        \ than creating a duplicate. The response's `created` field (and the HTTP\
        \ status — 201 when a new document was minted, 200 when an existing one was\
        \ matched) tells the two apart. With `?upsert=true`, the submitted `payload`/`title`\
        \ are also applied to the matched document (file-body divergence cannot be\
        \ diffed at upload-init — the bytes have not arrived yet — so the re-upload\
        \ itself replaces the body; `?upsert=true` requires the `documents:u` scope).\
        \ Requires the `documents:c` scope."
      operationId: uploadDocument
      parameters:
      - name: upsert
        in: query
        description: "When `true` and a document with the same `externalId` already\
          \ exists, apply the submitted `payload`/`title` to that existing document\
          \ (a metadata upsert) before re-issuing the presigned URL. The file body\
          \ is replaced inherently by the re-upload; it cannot be diffed at upload-init.\
          \ Defaults to `false`. Requires the `documents:u` scope in addition to `documents:c`."
        schema:
          type: boolean
          default: false
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileUploadRequest"
        required: true
      responses:
        "201":
          description: "A new document was created and a presigned upload URL generated\
            \ (`created: true`)."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileUploadResponse"
        "200":
          description: "A document with the same `externalId` already existed (`created:\
            \ false`); a fresh presigned URL to its existing object was re-issued\
            \ (idempotent upload)."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileUploadResponse"
        "400":
          description: "The request was invalid (for example, `fileName` or `fileType`\
            \ is missing)."
        "403":
          description: "Your API key or token lacks the `documents:c` scope (or, with\
            \ `?upsert=true`, the `documents:u` scope)."
        "429":
          description: You have exceeded the per-minute request limit for your plan. Read the `Retry-After` response header for the number of seconds to wait before retrying, and the `X-RateLimit-Limit` header for your plan's limit. See the rate limits guide for the per-plan limits and recommended backoff.
          headers:
            Retry-After:
              description: Seconds to wait before retrying. After this many seconds the rate-limit window resets and the request can be retried.
              schema:
                type: integer
            X-RateLimit-Limit:
              description: The maximum number of requests permitted per minute on your plan.
              schema:
                type: integer
            X-RateLimit-Remaining:
              description: Requests remaining in the current window. Always 0 on a 429 response.
              schema:
                type: integer
      security:
        - BearerAuth: []
  /v1/erasure-requests:

    post:
      tags:
      - Compliance
      summary: Submit an end-subject erasure request
      description: "Submits a right-to-erasure request for a single end-subject (a\
        \ user, client, or organization). Erasure removes exactly the data the subject\
        \ solely owns across the declared contexts, plus the subject's identity and\
        \ lookup rows. It never touches another account's data and never cascades\
        \ into another subject's data. The request is asynchronous: it returns 202\
        \ with a `requestId`; poll `GET /v1/erasure-requests/{id}` until the job completes\
        \ to obtain the completion certificate. Requires a root API key — a scoped\
        \ credential is rejected with 403."
      operationId: createErasureRequest
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErasureRequest"
        required: true
      responses:
        "202":
          description: Erasure request accepted. The body carries the request id and
            initial status; poll the GET endpoint for the certificate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErasureRequestResponse"
        "403":
          description: Not authorized. This operation requires a root API key; scoped
            credentials cannot submit erasure requests.
        "501":
          description: This endpoint is not yet implemented.
        "429":
          description: You have exceeded the per-minute request limit for your plan. Read the `Retry-After` response header for the number of seconds to wait before retrying, and the `X-RateLimit-Limit` header for your plan's limit. See the rate limits guide for the per-plan limits and recommended backoff.
          headers:
            Retry-After:
              description: Seconds to wait before retrying. After this many seconds the rate-limit window resets and the request can be retried.
              schema:
                type: integer
            X-RateLimit-Limit:
              description: The maximum number of requests permitted per minute on your plan.
              schema:
                type: integer
            X-RateLimit-Remaining:
              description: Requests remaining in the current window. Always 0 on a 429 response.
              schema:
                type: integer
      security:
        - BearerAuth: []
  /v1/erasure-requests/{id}:

    get:
      tags:
      - Compliance
      summary: Get the status and certificate of an erasure request
      description: "Polls an erasure request by id. While the job is still running\
        \ this returns its status only; once it completes, the response also includes\
        \ the verifiable completion certificate (which contexts were swept, per-context\
        \ deletion counts, and reports of dangling references and shared rows that\
        \ were left intact). Requires a root API key."
      operationId: getErasureRequest
      parameters:
      - name: id
        in: path
        description: "The id of the erasure request to poll, as returned when the\
          \ request was submitted."
        required: true
        schema:
          type: string
        example: er_550e8400e29b41d4a716446655440000
      responses:
        "200":
          description: "The current status of the erasure request, plus the completion\
            \ certificate once it has finished."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErasureRequestResponse"
        "403":
          description: Not authorized. This operation requires a root API key; scoped
            credentials cannot read erasure requests.
        "404":
          description: No erasure request exists with the given id.
        "501":
          description: This endpoint is not yet implemented.
      security:
        - BearerAuth: []
  /v1/admin/export:

