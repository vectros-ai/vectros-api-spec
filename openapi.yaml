          type: string
      responses:
        "200":
          description: "A paginated version history, as a `{data, nextCursor}` envelope."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelDataVersionPage"
        "404":
          description: No schema with this id exists in your account.
      security:
        - BearerAuth: []
  /v1/search:

    post:
      tags:
      - Search
      summary: Search your indexed content (documents and records)
      description: "Runs a hybrid, semantic, or text search across the content you\
        \ have indexed. By default it returns both documents and records in a single\
        \ unified result set; pass `contentTypes` to narrow the results (for example\
        \ `[\"documents\"]`). Each result carries a `sourceType` discriminator (`PartnerDocument`\
        \ or `GenericRecord`) so you can branch on the type. Requires the `search:r`\
        \ scope."
