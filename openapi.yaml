          items:
            $ref: "#/components/schemas/LookupDef"
        renderHints:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/RenderHintDef"
          description: UI rendering hints keyed by field id.
        capabilities:
          type: object
          additionalProperties:
            type: boolean
            description: "Feature flags for this schema. `auditHistory` (default true)\
              \ controls whether a change-history (version) trail is kept for this\
              \ type's data; setting it false stops recording the trail but never\
              \ affects your record or document data itself. `readAccessLog` (default\
              \ false; opt-in) controls accounting-of-disclosures logging: when true,\
              \ each governed read of this schema's records writes a retained, subject-enumerable\
              \ access record. The effective value resolves in order: this schema\
              \ flag, then your context's default, then the platform default (false)."
            example: false
          description: "Feature flags for this schema. `auditHistory` (default true)\
            \ controls whether a change-history (version) trail is kept for this type's\
            \ data; setting it false stops recording the trail but never affects your\
            \ record or document data itself. `readAccessLog` (default false; opt-in)\
            \ controls accounting-of-disclosures logging: when true, each governed\
            \ read of this schema's records writes a retained, subject-enumerable\
