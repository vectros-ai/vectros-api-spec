              description: Requests remaining in the current window. Always 0 on a 429 response.
              schema:
                type: integer
      security:
        - BearerAuth: []
    patch:
      tags:
      - Documents
      summary: Partially update a document (RFC 7386 JSON Merge Patch)
      description: "Partially updates a document using an RFC 7386 JSON Merge Patch.\
        \ The `payload` object is deep-merged: keys you send overwrite existing values\
        \ (recursing into nested objects), a key set to `null` is deleted, and keys\
        \ you omit are preserved — unlike PUT, which replaces the whole payload. Top-level\
