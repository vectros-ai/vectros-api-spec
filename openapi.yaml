          example: HYBRID
          enum:
          - HYBRID
          - SEMANTIC
          - TEXT
          - NONE
        allowedSurfaces:
          type: array
          description: "Which typed surfaces may bind this schema (record, document,\
            \ user, org, or client). Always present (it is required at write time)."
          example:
          - record
          items:
            type: string
            description: "Which typed surfaces may bind this schema (record, document,\
              \ user, org, or client). Always present (it is required at write time)."
            example: "[\"record\"]"
            enum:
            - record
            - document
            - user
            - org
            - client
          enum:
          - record
          - document
          - user
          - org
          - client
        active:
          type: boolean
          description: Whether this schema is active.
          example: true
        schemaVersion:
          type: integer
          description: "Schema version number, incremented each time the schema definition\
