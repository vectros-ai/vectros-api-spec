          example: STANDARD
          enum:
          - STANDARD
          - LOW_LATENCY
          - LARGE_PAYLOAD
        allowedSurfaces:
          type: array
          description: "Which typed surfaces may bind this schema by its id: record,\
            \ document, user, org, or client. Required and must be non-empty. A schema\
