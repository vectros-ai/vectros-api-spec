            \ and documents). This drives surface-scoped schema listing (`GET /v1/schemas?surface=`)\
            \ and is enforced at bind time — for example, a document cannot bind a\
            \ record-only schema."
          example:
          - record
          items:
            type: string
            description: "Which typed surfaces may bind this schema by its id: record,\
              \ document, user, org, or client. Required and must be non-empty. A\
              \ schema may list several surfaces (for a shared type usable on both\
              \ records and documents). This drives surface-scoped schema listing\
              \ (`GET /v1/schemas?surface=`) and is enforced at bind time — for example,\
              \ a document cannot bind a record-only schema."
            example: "[\"record\"]"
            enum:
            - record
            - document
            - user
            - org
            - client
          enum:
          - record
          - document
          - user
          - org
          - client
        active:
          type: boolean
          description: Whether this schema is active. An inactive schema rejects creation
