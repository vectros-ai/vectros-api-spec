            application/json:
              schema:
                $ref: "#/components/schemas/DocumentPage"
      security:
        - BearerAuth: []
    post:
      tags:
      - Documents
      summary: Ingest a text document
      description: "Creates a document from a raw text string and queues it for asynchronous\
        \ indexing so it becomes searchable. Optionally supply an `externalId` to\
        \ make the create idempotent — if a document with the same `externalId` already\
        \ exists in your context, that existing document is returned unchanged instead\
        \ of a duplicate being created. The response's `created` field (and the HTTP\
        \ status — 201 when created, 200 when an existing document was returned) tells\
        \ the two apart. To overwrite an existing document's content instead of returning\
        \ it unchanged, set `?upsert=true` (this also requires the `documents:u` scope).\
        \ Requires the `documents:c` scope."
      operationId: ingestDocument
      parameters:
      - name: upsert
        in: query
        description: "When `true`, if a document with the same `externalId` already\
          \ exists its content is overwritten (the submitted `payload`, `title`, and\
          \ — when supplied — `text` are applied and the version is bumped) instead\
          \ of being returned unchanged; the immutable `externalId`, `schemaId`, `indexMode`,\
          \ and ownership are never changed. Defaults to `false`. Requires the `documents:u`\
          \ scope in addition to `documents:c`."
